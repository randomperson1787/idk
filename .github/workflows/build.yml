name: Build Geode Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest

          - name: Android64
            os: ubuntu-latest
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        id: build
        with:
          combine: true
          target: ${{ matrix.config.target }}
          sdk: v5.6.0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VisualTPS-${{ matrix.config.name }}
          path: ${{ steps.build.outputs.build-output }}
